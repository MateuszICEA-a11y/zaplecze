baseURL = "https://busmaniak.pl/"
languageCode = "pl"
title = "BusManiak.pl"
theme = "theme"
themesDir = "../../shared"

summaryLength = 30

[pagination]
  pagerSize = 12
enableRobotsTXT = true

[params]
  description = "Portal o busach, vanach i kamperach – Ducato, Sprinter, Iveco Daily. Porównania, zabudowy, przeróbki, kalkulatory."
  ogImage = "/images/og-default.jpg"
  noindex = false

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

