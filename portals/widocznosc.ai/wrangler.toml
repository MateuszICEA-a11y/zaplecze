name = "widocznosc-ai"
compatibility_date = "2026-05-06"
pages_build_output_dir = "dist"

[vars]
PUBLIC_SITE_URL = "https://widocznosc.ai"

# Narzędzie fan-out (/narzedzia/fanout) używa:
#  - sekretu OPENAI_API_KEY
#  - bindingu KV o nazwie FANOUT_RL (rate-limit 3/IP/dzień)
# Oba konfigurowane w panelu Cloudflare Pages (Settings → Variables / KV bindings),
# tak jak OPENROUTER_API_KEY dla brand-check. Celowo NIE trzymamy tu ID KV ani sekretów.
