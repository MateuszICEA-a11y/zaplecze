name = "widocznosc-ai"
compatibility_date = "2026-05-06"
pages_build_output_dir = "dist"

[vars]
PUBLIC_SITE_URL = "https://widocznosc.ai"

# Sekret OPENAI_API_KEY dla narzędzia fan-out ustawiany w panelu Cloudflare Pages
# (Settings → Variables and Secrets), tak jak OPENROUTER_API_KEY dla brand-check.

# Limity narzędzi per IP/dzień (0 = wyłączony; default w kodzie):
#   FANOUT_DAILY_LIMIT=5  BRAND_CHECK_DAILY_LIMIT=3  URL_CHECK_DAILY_LIMIT=10
# Ustawiane w panelu Cloudflare Pages → Settings → Variables (Production + Preview).
# Stan KV w bindingu FANOUT_RL pod kluczem tool:<nazwa>:<ip>.

# Sekret RESEND_API_KEY dla formularza kontaktu (/api/contact) ustawiany w panelu
# Cloudflare Pages (Settings → Variables and Secrets). Wymaga zweryfikowanej w Resend
# domeny nadawcy widocznosc.ai (rekordy DKIM/SPF na subdomenie wysyłkowej).
# Endpoint reużywa bindingu KV FANOUT_RL (poniżej) z prefiksem klucza contact:.

# Weryfikacja SMS (OTP) dla narzędzi (/api/sms/send-code, /api/sms/verify-code).
# Sekrety ustawiane w panelu Cloudflare Pages → Settings → Variables and Secrets:
#   SMSAPI_TOKEN   – token OAuth z panelu SMSAPI.pl
#   SMSAPI_SENDER  – zarejestrowane pole nadawcy (np. "ICEA")
#   OTP_SALT       – losowy sekret do hashowania kodów
#   SMSAPI_TEST=1  – (opcjonalnie) SMSAPI nie wysyła realnie, nie zużywa kredytów
# Limity (0 = wyłączony; default w kodzie): SMS_HOURLY_PER_PHONE=3
#   SMS_SENDCODE_IP_LIMIT=10  SMS_DAILY_GLOBAL_LIMIT=30 (start; kill-switch kosztowy)
# Stan OTP w bindingu FANOUT_RL pod kluczami otp:<id>, otp-cd/-h/-ip/-g.
# Lokalnie: skopiuj sekrety do gitignored .dev.vars i uruchom `npx wrangler pages dev dist`.

# Binding KV dla rate-limitu narzędzia fan-out (/narzedzia/fanout, 3/IP/dzień).
# Ten projekt zarządza bindingami z wrangler.toml, więc ID musi być tutaj.
[[kv_namespaces]]
binding = "FANOUT_RL"
id = "4de520904f874cca893800bd54773910"
preview_id = "4de520904f874cca893800bd54773910"
