name: Clarity API Probe (one-off)

# Jednorazowa sonda: czy Data Export API zwraca nieudokumentowane metryki
# (AI Visibility / Citations / Topic Insights). Do usunięcia po weryfikacji.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Clarity Data Export API
        env:
          CLARITY_API_TOKEN: ${{ secrets.CLARITY_API_TOKEN }}
        shell: python
        run: |
          import json, os, urllib.request, urllib.error

          token = os.environ["CLARITY_API_TOKEN"].strip()
          headers = {"Authorization": f"Bearer {token}", "Content-Type": "application/json"}

          def get(url):
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      return r.status, r.read().decode()
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode()[:500]
              except Exception as e:
                  return None, str(e)

          # 1 request z dziennego limitu 10 – pełna struktura odpowiedzi bazowej
          status, body = get("https://www.clarity.ms/export-data/api/v1/project-live-insights?numOfDays=3")
          print(f"=== project-live-insights: HTTP {status} ===")
          if status == 200:
              data = json.loads(body)
              print(f"Liczba metryk: {len(data)}")
              for entry in data:
                  name = entry.get("metricName")
                  info = entry.get("information") or []
                  keys = sorted({k for row in info for k in row})
                  extra = sorted(set(entry) - {"metricName", "information"})
                  print(f"- {name}: rows={len(info)}, pola={keys}" + (f", extra_klucze={extra}" if extra else ""))
              # sample pierwszego wiersza każdej metryki (dane własne, nie-wrażliwe)
              print("\n=== SAMPLE ===")
              for entry in data:
                  info = entry.get("information") or []
                  print(entry.get("metricName"), "->", json.dumps(info[0] if info else {}, ensure_ascii=False)[:400])
          else:
              print(body)

          # Spekulacyjne endpointy – 404 nie zużywa limitu, sprawdzamy czy istnieją
          print("\n=== Sondy endpointów AI ===")
          for path in ["ai-visibility", "citations", "topic-insights", "project-ai-insights"]:
              s, b = get(f"https://www.clarity.ms/export-data/api/v1/{path}?numOfDays=3")
              print(f"{path}: HTTP {s} | {b[:200] if b else ''}")
