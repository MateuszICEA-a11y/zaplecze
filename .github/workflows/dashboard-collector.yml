name: Dashboard Collector

on:
  schedule:
    # 4:30 UTC = 6:30 CEST – po nocnym przeliczeniu Senuto, przed news-cronami (5:00/6:00 UTC)
    - cron: '30 4 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    # Zmiana collectora/konfigu = od razu przebieg testowy. Commity danych robi bot
    # z GITHUB_TOKEN, więc nie triggerują workflowu (brak pętli).
    paths:
      - '.github/workflows/dashboard-collector.yml'
      - 'dashboard/collector/**'
      - 'dashboard/domains.yaml'

permissions:
  contents: write

concurrency:
  group: dashboard-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r dashboard/collector/requirements.txt

      - name: Run collector
        env:
          SENUTO_API_KEY: ${{ secrets.SENUTO_API_KEY }}
          AHREFS_API_KEY: ${{ secrets.AHREFS_API_KEY }}
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          SMSAPI_TOKEN: ${{ secrets.SMSAPI_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_PROJECT_KEY: ${{ secrets.OPENROUTER_PROJECT_KEY }}
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
        run: python dashboard/collector/main.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/
          git diff --cached --quiet && exit 0
          git commit -m "dashboard: daily snapshot"
          # Ochrona przed wyścigiem z news-workflowami pushującymi na main
          git pull --rebase origin main
          git push
