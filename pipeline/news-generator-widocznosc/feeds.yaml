feeds:
  # Priorytet: realne newsy o modelach językowych i świecie AI (nie sprzęt/ogólny tech).
  # Źródła dedykowane modelom/LLM:
  - url: "https://the-decoder.com/feed/"
    category: "llm"
    name: "The Decoder"
  - url: "https://openai.com/news/rss.xml"
    category: "llm"
    name: "OpenAI"
  - url: "https://deepmind.google/blog/rss.xml"
    category: "llm"
    name: "Google DeepMind"
  - url: "https://venturebeat.com/category/ai/feed/"
    category: "llm"
    name: "VentureBeat AI"
  # Anthropic – brak RSS, więc kolektor sitemap (czyta /news/ z sitemap.xml,
  # sortuje po lastmod, dociąga max_items najnowszych; źródło pierwotne):
  - url: "https://www.anthropic.com/sitemap.xml"
    category: "llm"
    name: "Anthropic"
    type: "sitemap"
    path_filter: "/news/"
    max_items: 6
  # Szersze, ale wiarygodne źródła AI (redakcyjne):
  - url: "https://arstechnica.com/ai/feed/"
    category: "general-ai"
    name: "Ars Technica AI"
  - url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
    category: "general-ai"
    name: "The Verge AI"
  - url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    category: "general-ai"
    name: "TechCrunch AI"
  # AI-search / GEO – wprost o wyszukiwarkach AI (AI Overviews, ChatGPT Search):
  - url: "https://www.searchenginejournal.com/category/news/feed/"
    category: "ai-search"
    name: "Search Engine Journal"
