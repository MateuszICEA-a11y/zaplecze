<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ikona dashboardu: okno z paskiem i wykresami (słupki + linia trendu) -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1626"/>
      <stop offset="1" stop-color="#101f36"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#tile)"/>
  <!-- pasek okna -->
  <path d="M2 16v-2C2 7.4 7.4 2 14 2h36c6.6 0 12 5.4 12 12v2Z" fill="#1c2c47"/>
  <circle cx="11" cy="9" r="2.4" fill="#0a9cff"/>
  <circle cx="19" cy="9" r="2.4" fill="#f0883e"/>
  <circle cx="27" cy="9" r="2.4" fill="#23c483"/>
  <!-- słupki -->
  <rect x="10" y="36" width="9" height="16" rx="3" fill="#0a9cff"/>
  <rect x="23" y="28" width="9" height="24" rx="3" fill="#f0883e"/>
  <rect x="36" y="20" width="9" height="32" rx="3" fill="#23c483"/>
  <!-- linia trendu -->
  <polyline points="12,30 26,21 40,13 53,24" fill="none" stroke="#e8f1ff" stroke-width="3.4"
    stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="53" cy="24" r="3.6" fill="#e8f1ff"/>
  <!-- oś / podstawa -->
  <rect x="49" y="34" width="6" height="18" rx="3" fill="#33456b"/>
</svg>
