# Cloudflare Workers (static assets) – projekt "zaplecze-dashboard".
# Deploy przez Workers Builds (git integration): build `pnpm install && pnpm build`,
# deploy command: `npx wrangler deploy`. Podgląd lokalny: pnpm build && npx wrangler dev
name = "zaplecze-dashboard"
compatibility_date = "2026-05-06"
# Worker (worker.js) robi Basic Auth na CAŁEJ aplikacji – sekret DASH_PASSWORD
# ustawiany w Workers → Settings → Variables and Secrets (login dowolny).
main = "worker.js"

[assets]
directory = "./dist"
binding = "ASSETS"
run_worker_first = true
