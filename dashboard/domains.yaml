# Konfiguracja dashboardu analitycznego.
# Nowa domena = nowy wpis w `domains` – collector i frontend podejmą ją automatycznie.
domains:
  - id: widocznosc.ai
    name: widocznosc.ai
    senuto:
      enabled: true
      country_id: "200" # Poland (database 2.0) – ta sama baza co app.senuto.com; "1" = legacy 1.0
    gsc:
      enabled: true
      site: "https://widocznosc.ai/" # property typu prefiks URL (nie domenowa)
    ahrefs:
      enabled: true
      target: widocznosc.ai
      mode: subdomains
    backlinks:
      enabled: false # DataForSEO – fallback, wyłączony na rzecz Ahrefs
    clarity:
      enabled: true
      # Token Clarity jest per projekt (CLARITY_API_TOKEN = grupa-icea.pl).
      # Własny token widocznosc.ai dodany do GH Secrets 2026-07-21.
      token_env: CLARITY_API_TOKEN_WIDOCZNOSC
    leads:
      enabled: true # eksport leadów/użyć narzędzi z KV; wymaga LEADS_EXPORT_TOKEN

  - id: grupa-icea.pl
    name: grupa-icea.pl
    senuto:
      enabled: true
      country_id: "200" # Poland (database 2.0)
    gsc:
      enabled: true
      # Property typu prefiks URL z www (jedyna widoczna dla service accounta,
      # siteFullUser od 2026-07-21) – sc-domain nie istnieje dla tej domeny.
      site: "https://www.grupa-icea.pl/"
    ahrefs:
      enabled: true
      target: grupa-icea.pl
      mode: subdomains
    clarity:
      enabled: true # CLARITY_API_TOKEN = projekt grupa-icea.pl (potwierdzone sondą 2026-07-21)
    leads:
      enabled: false # brak endpointu leadów na grupa-icea.pl

# Źródła per konto (nie per domena) – salda kredytów.
global:
  smsapi:
    enabled: true
    sender: ICEA # nadawca jak w OTP widocznosc.ai – od niego zależy cena
    cost_fallback: 0.16 # zł/SMS gdy wycena test=1 nie zadziała
  openrouter:
    enabled: true

# run: re-test LEADS_EXPORT_TOKEN po poprawce w GH Secrets 2026-07-21
