{{ with .Params.comparison }}
<table class="comparison-table">
  <thead>
    <tr>
      {{ range .headers }}
      <th>{{ . }}</th>
      {{ end }}
    </tr>
  </thead>
  <tbody>
    {{ range .rows }}
    <tr>
      {{ range . }}
      <td>{{ . }}</td>
      {{ end }}
    </tr>
    {{ end }}
  </tbody>
</table>
{{ end }}
