{{- if .IsPage -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Description | default "" | jsonify }},
  "url": {{ .Permalink | jsonify }},
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  {{- with .Params.image }}
  "image": {
    "@type": "ImageObject",
    "url": {{ . | absURL | jsonify }}
  },
  {{- end }}
  {{- with .Params.author }}
  {{- $author := $.Site.GetPage (printf "/autor/%s" .) }}
  {{- if $author }}
  "author": {
    "@type": "Person",
    "name": {{ $author.Title | jsonify }},
    "url": {{ $author.Permalink | jsonify }}
    {{- with $author.Params.sameAs }},
    "sameAs": [{{ range $i, $v := . }}{{ if $i }},{{ end }}{{ $v | jsonify }}{{ end }}]
    {{- end }}
  },
  {{- end }}
  {{- end }}
  "publisher": {
    "@type": "Organization",
    "name": {{ .Site.Title | jsonify }},
    "url": {{ .Site.BaseURL | jsonify }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  },
  "wordCount": {{ countwords .Content }}
}
</script>
{{- end -}}
