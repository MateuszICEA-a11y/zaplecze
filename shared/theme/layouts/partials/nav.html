<nav class="site-nav" aria-label="Nawigacja glowna">
  <div class="container">
    <a href="{{ .Site.BaseURL }}" class="site-nav__logo">{{ .Site.Title }}</a>

    <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
    <label for="nav-toggle" class="nav-toggle-label" aria-label="Menu">
      <span></span>
    </label>

    <ul class="site-nav__menu">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</nav>
