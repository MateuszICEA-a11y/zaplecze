<header class="site-header">
  <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">

  <nav class="site-header__nav" aria-label="Nawigacja główna">
    <a href="{{ .Site.BaseURL }}" class="site-logo">
      <span class="site-logo__bus">BUS</span><span class="site-logo__maniak">MANIAK</span><span class="site-logo__dot">.pl</span>
    </a>

    <label for="nav-toggle" class="nav-toggle-label" aria-label="Menu">
      <span></span>
    </label>

    <div class="site-nav__links">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}" class="site-nav__link{{ if $.IsMenuCurrent "main" . }} site-nav__link--active{{ end }}">{{ .Name }}</a>
      {{ end }}
    </div>
  </nav>
</header>
