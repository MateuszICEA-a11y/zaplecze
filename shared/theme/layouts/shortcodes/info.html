{{/* Info/warning box – usage: {{% info title="Ważna uwaga" icon="engineering" %}}Treść{{% /info %}} */}}
<div class="info-box{{ with .Params.type }} info-box--{{ . }}{{ end }}">
  <div class="info-box__header">
    <span class="material-symbols-outlined">{{ .Params.icon | default "info" }}</span>
    {{ .Params.title | default "Informacja" }}
  </div>
  <div class="info-box__content">
    {{ .Inner | markdownify }}
  </div>
</div>
