{{ $id := printf "dmc-%d" (now.UnixNano) }}
<div class="dmc-calc" id="{{ $id }}">
  <style>
    .dmc-calc {
      background: var(--c-bg-alt, #f8f8f8);
      border: 1px solid var(--c-border, #ddd);
      border-radius: var(--radius-sm, 6px);
      padding: 1.5rem;
      margin: 1.5rem 0;
      font-family: inherit;
      color: var(--c-text, #333);
    }
    .dmc-calc *, .dmc-calc *::before, .dmc-calc *::after {
      box-sizing: border-box;
    }
    .dmc-calc__title {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 1rem;
      color: var(--c-dark, #1a1a1a);
    }
    .dmc-calc__grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) {
      .dmc-calc__grid {
        grid-template-columns: 1fr;
      }
    }
    .dmc-calc__field {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .dmc-calc__field--full {
      grid-column: 1 / -1;
    }
    .dmc-calc__label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--c-dark, #1a1a1a);
    }
    .dmc-calc__hint {
      font-size: 0.75rem;
      color: var(--c-text, #666);
      opacity: 0.7;
    }
    .dmc-calc select,
    .dmc-calc input[type="number"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--c-border, #ccc);
      border-radius: var(--radius-sm, 6px);
      font-size: 1rem;
      font-family: inherit;
      color: var(--c-text, #333);
      background: #fff;
      -moz-appearance: textfield;
    }
    .dmc-calc input[type="number"]::-webkit-inner-spin-button,
    .dmc-calc input[type="number"]::-webkit-outer-spin-button {
      opacity: 1;
    }
    .dmc-calc select:focus,
    .dmc-calc input:focus {
      outline: 2px solid var(--c-orange, #e67e22);
      outline-offset: -1px;
    }
    .dmc-calc__specs {
      display: none;
      grid-column: 1 / -1;
      gap: 0.5rem;
      margin-top: 0.25rem;
      padding: 0.75rem 1rem;
      background: #fff;
      border-radius: var(--radius-sm, 6px);
      border: 1px solid var(--c-border, #ddd);
    }
    .dmc-calc__specs.is-visible {
      display: flex;
      flex-wrap: wrap;
    }
    .dmc-calc__spec {
      font-size: 0.85rem;
      margin-right: 1.5rem;
    }
    .dmc-calc__spec strong {
      color: var(--c-dark, #1a1a1a);
    }
    .dmc-calc__separator {
      grid-column: 1 / -1;
      border: none;
      border-top: 1px solid var(--c-border, #ddd);
      margin: 0.5rem 0;
    }
    .dmc-calc__result {
      display: none;
      grid-column: 1 / -1;
      margin-top: 0.5rem;
    }
    .dmc-calc__result.is-visible {
      display: block;
    }
    .dmc-calc__bar-wrap {
      background: #e0e0e0;
      border-radius: var(--radius-sm, 6px);
      height: 1.5rem;
      overflow: hidden;
      position: relative;
    }
    .dmc-calc__bar {
      height: 100%;
      border-radius: var(--radius-sm, 6px);
      transition: width 0.3s ease, background-color 0.3s ease;
      min-width: 2%;
    }
    .dmc-calc__bar--green { background: #27ae60; }
    .dmc-calc__bar--yellow { background: #f39c12; }
    .dmc-calc__bar--red { background: #e74c3c; }
    .dmc-calc__bar-label {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--c-dark, #1a1a1a);
    }
    .dmc-calc__breakdown {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1.5rem;
      margin: 0.75rem 0;
      font-size: 0.9rem;
    }
    .dmc-calc__verdict {
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm, 6px);
      font-weight: 700;
      font-size: 1rem;
      text-align: center;
      margin-top: 0.5rem;
    }
    .dmc-calc__verdict--ok {
      background: #d5f5e3;
      color: #1e8449;
      border: 1px solid #27ae60;
    }
    .dmc-calc__verdict--warn {
      background: #fef9e7;
      color: #9a7d0a;
      border: 1px solid #f39c12;
    }
    .dmc-calc__verdict--over {
      background: #fadbd8;
      color: #a93226;
      border: 1px solid #e74c3c;
    }
  </style>

  <div class="dmc-calc__title">Kalkulator DMC – sprawdź obciążenie busa</div>

  <div class="dmc-calc__grid">
    <div class="dmc-calc__field dmc-calc__field--full">
      <label class="dmc-calc__label" for="{{ $id }}-model">Model busa</label>
      <select id="{{ $id }}-model">
        <option value="">– wybierz model –</option>
        {{ range $.Page.Site.Data.buses }}
        <option value="{{ .id }}" data-masa="{{ .masa_wlasna_kg }}" data-dmc="{{ .dmc_kg }}" data-ladownosc="{{ .ladownosc_kg }}">{{ .name }} (DMC {{ .dmc_kg }} kg)</option>
        {{ end }}
      </select>
    </div>

    <div class="dmc-calc__specs" id="{{ $id }}-specs">
      <span class="dmc-calc__spec"><strong>Masa własna:</strong> <span id="{{ $id }}-v-masa">–</span> kg</span>
      <span class="dmc-calc__spec"><strong>DMC:</strong> <span id="{{ $id }}-v-dmc">–</span> kg</span>
      <span class="dmc-calc__spec"><strong>Ładowność kat.:</strong> <span id="{{ $id }}-v-lad">–</span> kg</span>
    </div>

    <hr class="dmc-calc__separator">

    <div class="dmc-calc__field">
      <label class="dmc-calc__label" for="{{ $id }}-passengers">Liczba pasażerów</label>
      <span class="dmc-calc__hint">w tym kierowca – 75 kg/os.</span>
      <input type="number" id="{{ $id }}-passengers" min="1" max="12" value="1">
    </div>

    <div class="dmc-calc__field">
      <label class="dmc-calc__label" for="{{ $id }}-cargo">Ładunek (kg)</label>
      <span class="dmc-calc__hint">bagaże, sprzęt, wyposażenie kempingowe</span>
      <input type="number" id="{{ $id }}-cargo" min="0" value="0">
    </div>

    <div class="dmc-calc__field">
      <label class="dmc-calc__label" for="{{ $id }}-equipment">Osprzęt dodatkowy (kg)</label>
      <span class="dmc-calc__hint">hak holowniczy, bagażnik dachowy, markiza itp.</span>
      <input type="number" id="{{ $id }}-equipment" min="0" value="0">
    </div>
  </div>

  <div class="dmc-calc__result" id="{{ $id }}-result">
    <div class="dmc-calc__breakdown" id="{{ $id }}-breakdown"></div>
    <div class="dmc-calc__bar-wrap">
      <div class="dmc-calc__bar" id="{{ $id }}-bar"></div>
      <span class="dmc-calc__bar-label" id="{{ $id }}-bar-label"></span>
    </div>
    <div class="dmc-calc__verdict" id="{{ $id }}-verdict"></div>
  </div>

  <script>
  (function() {
    var root = document.getElementById('{{ $id }}');
    var selModel = root.querySelector('#{{ $id }}-model');
    var inpPass = root.querySelector('#{{ $id }}-passengers');
    var inpCargo = root.querySelector('#{{ $id }}-cargo');
    var inpEquip = root.querySelector('#{{ $id }}-equipment');
    var elSpecs = root.querySelector('#{{ $id }}-specs');
    var elVMasa = root.querySelector('#{{ $id }}-v-masa');
    var elVDmc = root.querySelector('#{{ $id }}-v-dmc');
    var elVLad = root.querySelector('#{{ $id }}-v-lad');
    var elResult = root.querySelector('#{{ $id }}-result');
    var elBreakdown = root.querySelector('#{{ $id }}-breakdown');
    var elBar = root.querySelector('#{{ $id }}-bar');
    var elBarLabel = root.querySelector('#{{ $id }}-bar-label');
    var elVerdict = root.querySelector('#{{ $id }}-verdict');

    function fmt(n) {
      return n.toLocaleString('pl-PL');
    }

    function getSelected() {
      var opt = selModel.options[selModel.selectedIndex];
      if (!opt || !opt.value) return null;
      return {
        masa: parseInt(opt.dataset.masa, 10),
        dmc: parseInt(opt.dataset.dmc, 10),
        ladownosc: parseInt(opt.dataset.ladownosc, 10)
      };
    }

    function calc() {
      var bus = getSelected();
      if (!bus) {
        elSpecs.classList.remove('is-visible');
        elResult.classList.remove('is-visible');
        return;
      }

      elVMasa.textContent = fmt(bus.masa);
      elVDmc.textContent = fmt(bus.dmc);
      elVLad.textContent = fmt(bus.ladownosc);
      elSpecs.classList.add('is-visible');

      var passengers = Math.max(1, parseInt(inpPass.value, 10) || 1);
      var cargo = Math.max(0, parseInt(inpCargo.value, 10) || 0);
      var equipment = Math.max(0, parseInt(inpEquip.value, 10) || 0);

      var passWeight = passengers * 75;
      var total = bus.masa + passWeight + cargo + equipment;
      var remaining = bus.dmc - total;
      var pct = (total / bus.dmc) * 100;

      elBreakdown.innerHTML =
        '<span>Masa własna: <strong>' + fmt(bus.masa) + ' kg</strong></span>' +
        '<span>Pasażerowie: <strong>' + passengers + ' \u00d7 75 = ' + fmt(passWeight) + ' kg</strong></span>' +
        '<span>Ładunek: <strong>' + fmt(cargo) + ' kg</strong></span>' +
        '<span>Osprzęt: <strong>' + fmt(equipment) + ' kg</strong></span>' +
        '<span>Łącznie: <strong>' + fmt(total) + ' / ' + fmt(bus.dmc) + ' kg</strong></span>';

      var barPct = Math.min(pct, 100);
      elBar.style.width = barPct + '%';
      elBar.className = 'dmc-calc__bar';
      if (pct > 95) {
        elBar.classList.add('dmc-calc__bar--red');
      } else if (pct > 80) {
        elBar.classList.add('dmc-calc__bar--yellow');
      } else {
        elBar.classList.add('dmc-calc__bar--green');
      }
      elBarLabel.textContent = pct.toFixed(1) + '%';

      elVerdict.className = 'dmc-calc__verdict';
      if (remaining >= 0 && pct <= 80) {
        elVerdict.classList.add('dmc-calc__verdict--ok');
        elVerdict.textContent = '\u2705 Mieścisz się \u2013 zapas: ' + fmt(remaining) + ' kg';
      } else if (remaining >= 0) {
        elVerdict.classList.add('dmc-calc__verdict--warn');
        elVerdict.textContent = '\u26a0\ufe0f Mieścisz się, ale blisko limitu \u2013 zapas: ' + fmt(remaining) + ' kg';
      } else {
        elVerdict.classList.add('dmc-calc__verdict--over');
        elVerdict.textContent = '\u274c Przekraczasz DMC o ' + fmt(Math.abs(remaining)) + ' kg!';
      }

      elResult.classList.add('is-visible');
    }

    selModel.addEventListener('change', calc);
    inpPass.addEventListener('input', calc);
    inpCargo.addEventListener('input', calc);
    inpEquip.addEventListener('input', calc);
  })();
  </script>
</div>
